<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Wallace Martins — Founder of Kronn.io">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="55%" stop-color="#0A0E17"/>
      <stop offset="100%" stop-color="#12090A"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1E293B" stroke-width="1" stroke-opacity="0.45"/>
    </pattern>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="340" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="340" fill="url(#bg)"/>
    <rect width="1200" height="340" fill="url(#grid)"/>
    <ellipse cx="120" cy="30" rx="420" ry="240" fill="url(#glow)"/>
    <ellipse cx="1120" cy="330" rx="380" ry="220" fill="url(#glow2)"/>

    <!-- eyebrow -->
    <g transform="translate(64, 62)">
      <circle cx="4" cy="-4" r="4" fill="#22C55E">
        <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="20" y="1" font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace"
            font-size="14" letter-spacing="2.4" fill="#F59E0B" font-weight="600">
        FOUNDER @ KRONN.IO &amp; HUBDEV.IO · LARAVEL · FILAMENT · DEVOPS
      </text>
    </g>

    <!-- name -->
    <text x="64" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif"
          font-size="62" font-weight="800" letter-spacing="-1.5" fill="url(#name)">
      Wallace Martins
    </text>

    <!-- accent rule -->
    <rect x="64" y="170" width="260" height="3" rx="1.5" fill="url(#accent)"/>

    <!-- tagline -->
    <text x="64" y="209" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif"
          font-size="20" fill="#94A3B8">
      Building <tspan fill="#E2E8F0" font-weight="600">Kronn.io</tspan>, server management from your first VPS to
    </text>
    <text x="64" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif"
          font-size="20" fill="#94A3B8">
      Kubernetes, and <tspan fill="#E2E8F0" font-weight="600">HubDev.io</tspan>, one dev environment for every OS.
    </text>

    <!-- stat chips -->
    <g transform="translate(64, 258)" font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace">
      <g>
        <rect x="0" y="0" width="182" height="52" rx="10" fill="#0F172A" fill-opacity="0.85" stroke="#F59E0B" stroke-opacity="0.35"/>
        <text x="16" y="22" font-size="20" font-weight="700" fill="#F8FAFC">38K+</text>
        <text x="16" y="40" font-size="11" letter-spacing="1.2" fill="#64748B">PACKAGIST DOWNLOADS</text>
      </g>
      <g transform="translate(198, 0)">
        <rect x="0" y="0" width="150" height="52" rx="10" fill="#0F172A" fill-opacity="0.85" stroke="#F59E0B" stroke-opacity="0.35"/>
        <text x="16" y="22" font-size="20" font-weight="700" fill="#F8FAFC">260+</text>
        <text x="16" y="40" font-size="11" letter-spacing="1.2" fill="#64748B">GITHUB STARS</text>
      </g>
      <g transform="translate(364, 0)">
        <rect x="0" y="0" width="182" height="52" rx="10" fill="#0F172A" fill-opacity="0.85" stroke="#F59E0B" stroke-opacity="0.35"/>
        <text x="16" y="22" font-size="20" font-weight="700" fill="#F8FAFC">4</text>
        <text x="16" y="40" font-size="11" letter-spacing="1.2" fill="#64748B">FILAMENT PLUGINS</text>
      </g>
    </g>

    <!-- right: Kronn.io product card -->
    <g transform="translate(756, 74)" font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace">
      <rect x="0" y="0" width="396" height="208" rx="12" fill="#0F172A" fill-opacity="0.92" stroke="#1E293B"/>
      <circle cx="20" cy="20" r="5" fill="#EF4444" fill-opacity="0.8"/>
      <circle cx="38" cy="20" r="5" fill="#F59E0B" fill-opacity="0.8"/>
      <circle cx="56" cy="20" r="5" fill="#22C55E" fill-opacity="0.8"/>
      <text x="376" y="25" text-anchor="end" font-size="12" letter-spacing="1.5" fill="#475569">PRODUCTS</text>
      <line x1="0" y1="40" x2="396" y2="40" stroke="#1E293B"/>

      <circle cx="24" cy="64" r="4" fill="#F59E0B">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="40" y="69" font-size="14" letter-spacing="1.4" font-weight="700" fill="#F59E0B">KRONN.IO</text>
      <text x="40" y="90" font-size="13" fill="#94A3B8">Deploy PHP · Node · Python · Go</text>
      <text x="40" y="109" font-size="13" fill="#64748B">VPS → Swarm → Kubernetes, no SSH</text>

      <line x1="20" y1="128" x2="376" y2="128" stroke="#1E293B"/>

      <circle cx="24" cy="150" r="4" fill="#38BDF8">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <text x="40" y="155" font-size="14" letter-spacing="1.4" font-weight="700" fill="#38BDF8">HUBDEV.IO</text>
      <text x="40" y="176" font-size="13" fill="#94A3B8">40+ services · native ↔ Docker</text>
      <text x="40" y="195" font-size="13" fill="#64748B">Linux · Windows (no WSL) · macOS</text>
    </g>

    <rect x="0" y="336" width="1200" height="4" fill="url(#accent)"/>
  </g>
</svg>
