name: Refresh stats card

on:
  schedule:
    - cron: '17 6 * * *' # daily, 06:17 UTC
  push:
    branches: [main]
    paths: ['scripts/generate-stats.mjs', '.github/workflows/stats.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/generate-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if the card changed
        run: |
          if git diff --quiet -- assets/stats.svg; then
            echo "No change."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg
          git commit -m "chore: refresh stats card"
          git push
